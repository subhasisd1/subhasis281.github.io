<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" width="640" height="760" role="img" aria-label="Photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2647"/>
      <stop offset="1" stop-color="#0b1f3a"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#4f8cff" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="640" height="760" fill="url(#bg)"/>
  <rect width="640" height="760" fill="url(#grid)"/>

  <!-- avatar silhouette -->
  <g transform="translate(320 300)">
    <circle r="120" fill="url(#ac)" opacity="0.15"/>
    <circle cx="0" cy="-30" r="72" fill="url(#ac)" opacity="0.9"/>
    <path d="M-118 150 C-118 40 -70 8 0 8 C70 8 118 40 118 150 Z" fill="url(#ac)" opacity="0.9"/>
  </g>

  <!-- initials -->
  <text x="320" y="560" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="90" font-weight="700" fill="#e8eefb" letter-spacing="6">AR</text>

  <!-- helper label -->
  <text x="320" y="620" text-anchor="middle" font-family="'Inter', sans-serif" font-size="24" fill="#92a3bd">Add your photo</text>
  <text x="320" y="652" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5a6b82">→ assets/profile.jpg</text>

  <!-- corner ticks -->
  <g stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.8">
    <path d="M30 30 h48 M30 30 v48"/>
    <path d="M610 30 h-48 M610 30 v48"/>
    <path d="M30 730 h48 M30 730 v-48"/>
    <path d="M610 730 h-48 M610 730 v-48"/>
  </g>
</svg>
